<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演唱会·集</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --border: #2a2a4a;
            --primary: #e94560;
            --primary-glow: rgba(233, 69, 96, 0.3);
            --accent: #0f3460;
            --accent2: #533483;
            --text: #eee;
            --text2: #aab;
            --green: #00d68f;
            --yellow: #ffaa00;
            --red: #ff3d71;
            --blue: #0095ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .top-bar {
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent2), var(--blue), var(--primary));
            background-size: 200% 100%;
            animation: gradient 4s ease infinite;
        }
        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header {
            padding: 32px 40px 24px;
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            pointer-events: none;
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .header h1 span { color: var(--primary); }
        .header .subtitle {
            color: var(--text2);
            font-size: 14px;
            margin-top: 4px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .update-info {
            color: var(--text2);
            font-size: 13px;
        }
        .update-info strong { color: var(--green); }

        .location-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            color: var(--primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .location-badge:hover {
            background: rgba(233, 69, 96, 0.2);
        }
        .location-badge .loc-icon { font-size: 15px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            max-width: 1400px;
            margin: 24px auto 0;
            padding: 0 40px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .stat-card .label { color: var(--text2); font-size: 13px; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card .value.primary { color: var(--primary); }
        .stat-card .value.green { color: var(--green); }
        .stat-card .value.blue { color: var(--blue); }
        .stat-card .value.yellow { color: var(--yellow); }

        /* 省份切换栏 */
        .province-bar {
            max-width: 1400px;
            margin: 24px auto 0;
            padding: 0 40px;
        }
        .province-bar-inner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
        }
        .province-bar-label {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .province-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .province-tag {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .province-tag:hover {
            border-color: var(--primary);
            color: var(--text);
        }
        .province-tag.active {
            background: rgba(233, 69, 96, 0.15);
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }
        .province-tag .tag-count {
            font-size: 11px;
            margin-left: 4px;
            opacity: 0.7;
        }

        .filter-bar {
            max-width: 1400px;
            margin: 20px auto 0;
            padding: 0 40px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar label {
            color: var(--text2);
            font-size: 14px;
            margin-right: -4px;
        }
        .filter-bar select,
        .filter-bar input {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .filter-bar select:focus,
        .filter-bar input:focus { border-color: var(--primary); }
        .filter-bar input { width: 200px; }
        .filter-bar select option { background: var(--surface); }

        .results-info {
            max-width: 1400px;
            margin: 20px auto 0;
            padding: 0 40px;
            color: var(--text2);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .results-info strong { color: var(--text); }

        .concert-list {
            max-width: 1400px;
            margin: 16px auto 40px;
            padding: 0 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        .concert-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.25s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .concert-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .concert-card:hover .card-name {
            color: var(--primary);
        }
        .card-footer-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            background: rgba(233, 69, 96, 0.12);
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }
        .card-footer-link:hover {
            background: rgba(233, 69, 96, 0.25);
        }
        .card-inner {
            display: flex;
            gap: 16px;
            padding: 18px;
        }
        .card-img {
            width: 90px;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--surface2);
        }
        .card-img-placeholder {
            width: 90px;
            height: 120px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .card-body { flex: 1; min-width: 0; }
        .card-name {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .card-artist {
            font-size: 13px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .card-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            color: var(--text2);
        }
        .card-meta span { display: flex; align-items: center; gap: 4px; }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.15);
        }
        .card-price {
            font-size: 15px;
            font-weight: 600;
            color: var(--yellow);
        }
        .card-status {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        .status-selling { background: rgba(0, 214, 143, 0.15); color: var(--green); }
        .status-presale { background: rgba(0, 149, 255, 0.15); color: var(--blue); }
        .status-soldout { background: rgba(255, 61, 113, 0.15); color: var(--red); }
        .status-ended { background: rgba(170, 170, 187, 0.15); color: var(--text2); }
        .status-unknown { background: rgba(170, 170, 187, 0.15); color: var(--text2); }
        .status-pending { background: rgba(255, 165, 0, 0.15); color: #ff8c00; }
        .status-replenish { background: rgba(76, 175, 80, 0.15); color: #4caf50; }

        .source-badge {
            display: inline-block;
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 3px;
            margin-left: 6px;
            font-weight: 500;
            vertical-align: middle;
        }
        .source-badge.piaoniu { background: rgba(233, 30, 99, 0.15); color: #e91e63; }
        .source-badge.ypiao { background: rgba(255, 152, 0, 0.15); color: #ff9800; }
        .source-badge.damai { background: rgba(255, 61, 113, 0.15); color: #ff3d71; }
        .source-badge.other { background: rgba(170, 170, 187, 0.15); color: var(--text2); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 16px; }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            max-width: 360px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: var(--green); color: #000; }
        .toast.error { background: var(--red); color: #fff; }

        .auto-refresh-bar {
            max-width: 1400px;
            margin: 0 auto 40px;
            padding: 0 40px;
            display: flex;
            justify-content: center;
            gap: 8px;
            color: var(--text2);
            font-size: 13px;
        }
        .auto-refresh-bar .countdown {
            color: var(--primary);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 768px) {
            .header { padding: 20px; }
            .stats-grid, .filter-bar, .results-info, .concert-list, .province-bar, .auto-refresh-bar {
                padding: 0 16px;
            }
            .concert-list { grid-template-columns: 1fr; }
            .card-img, .card-img-placeholder { width: 70px; height: 95px; }
            .header-content { flex-direction: column; align-items: flex-start; }
            .province-tags { gap: 6px; }
            .province-tag { padding: 5px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>

    <header class="header">
        <div class="header-content">
            <div>
                <h1>🎵 <span>演唱会·集</span></h1>
                <p class="subtitle">全国演唱会信息聚合，自动定位你所在省份</p>
            </div>
            <div class="header-right">
                <span class="location-badge" id="locationBadge" title="点击查看全部省份">
                    <span class="loc-icon">📍</span>
                    <span id="locationText">定位中...</span>
                </span>
                <span class="update-info">更新：<strong id="updateTime">加载中...</strong></span>
            </div>
        </div>
    </header>

    <section class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="label">当前显示</div>
            <div class="value primary" id="totalCount">-</div>
        </div>
        <div class="stat-card">
            <div class="label">覆盖城市</div>
            <div class="value blue" id="cityCount">-</div>
        </div>
        <div class="stat-card">
            <div class="label">全国总计</div>
            <div class="value yellow" id="nationalCount">-</div>
        </div>
    </section>

    <section class="province-bar" id="provinceBar" style="display:none;">
        <div class="province-bar-inner">
            <div class="province-bar-label">🌏 选择省份</div>
            <div class="province-tags" id="provinceTags"></div>
        </div>
    </section>

    <section class="filter-bar" id="filterBar" style="display:none;">
        <label>筛选：</label>
        <select id="filterCity" onchange="applyFilter()">
            <option value="">全部城市</option>
        </select>
        <select id="filterStatus" onchange="applyFilter()">
            <option value="">全部状态</option>
            <option value="在售">在售</option>
            <option value="预售">预售</option>
            <option value="已售罄">已售罄</option>
            <option value="已结束">已结束</option>
            <option value="待定">待定</option>
        </select>
        <input type="text" id="filterKeyword" placeholder="搜索歌手/演唱会名..." oninput="applyFilter()">
    </section>

    <div class="results-info" id="resultsInfo"></div>

    <main class="concert-list" id="concertList">
        <div class="empty-state" style="grid-column: 1/-1;">
            <div class="icon">⏳</div>
            <p>正在加载演唱会数据...</p>
        </div>
    </main>

    <div class="auto-refresh-bar" id="autoRefreshBar">
        <span>数据每30分钟自动更新，下次刷新：</span>
        <span class="countdown" id="countdown">--:--</span>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let allConcerts = [];
        let currentConcerts = [];
        let provinces = {};
        let currentProvince = '';
        const DATA_URL = 'data.json';

        // 英文省份 → 中文映射
        const PROVINCE_EN_CN = {
            "Beijing": "北京", "Shanghai": "上海", "Tianjin": "天津", "Chongqing": "重庆",
            "Hebei": "河北", "Shanxi": "山西", "Liaoning": "辽宁", "Jilin": "吉林",
            "Heilongjiang": "黑龙江", "Jiangsu": "江苏", "Zhejiang": "浙江", "Anhui": "安徽",
            "Fujian": "福建", "Jiangxi": "江西", "Shandong": "山东", "Henan": "河南",
            "Hubei": "湖北", "Hunan": "湖南", "Guangdong": "广东", "Hainan": "海南",
            "Sichuan": "四川", "Guizhou": "贵州", "Yunnan": "云南", "Shaanxi": "陕西",
            "Gansu": "甘肃", "Qinghai": "青海", "Taiwan": "台湾",
            "Inner Mongolia": "内蒙古", "Guangxi": "广西", "Tibet": "西藏", "Xinjiang": "新疆",
            "Ningxia": "宁夏", "Hong Kong": "香港", "Macau": "澳门", "Macau": "澳门",
        };

        // IP 定位 - 全部 HTTPS + CORS 兼容
        async function detectLocation() {
            const apis = [
                // freeipapi.com（免费，HTTPS，CORS *，返回英文省份名）
                async () => {
                    const resp = await fetch('https://freeipapi.com/api/json');
                    const data = await resp.json();
                    return data.regionName || '';
                },
                // ipregistry.co（试用，HTTPS，CORS *）
                async () => {
                    const resp = await fetch('https://api.ipregistry.co/?key=tryout');
                    const data = await resp.json();
                    return data.location?.region?.name || '';
                },
            ];

            for (const api of apis) {
                try {
                    const provinceEn = await api();
                    if (provinceEn) {
                        // 英文 → 中文
                        return PROVINCE_EN_CN[provinceEn]
                            || PROVINCE_EN_CN[provinceEn.replace(/\s+Sheng$/, '').replace(/\s+SAR$/, '')]
                            || provinceEn;
                    }
                } catch {}
            }
            return '';
        }

        // 匹配省份名（支持中文直接匹配）
        function matchProvince(detected) {
            if (!detected) return '';
            // 直接在已知的省份列表中查找
            for (const p of Object.keys(provinces)) {
                if (p === detected) return p;
            }
            // 去掉常见后缀再匹配
            let clean = detected.replace(/[省市自治区壮族回族维吾尔特别行政区ShengSAR]+$/, '').trim();
            for (const p of Object.keys(provinces)) {
                if (p === clean || p.includes(clean) || clean.includes(p)) return p;
            }
            return '';
        }

        function getStatusClass(status) {
            if (status === '预售') return 'status-presale';
            if (status === '在售') return 'status-selling';
            if (status === '已售罄') return 'status-soldout';
            if (status === '已结束') return 'status-ended';
            if (status === '待定') return 'status-pending';
            if (status === '补票中') return 'status-replenish';
            return 'status-unknown';
        }

        function getSourceClass(source) {
            if (source === '票牛网') return 'piaoniu';
            if (source === '有票网') return 'ypiao';
            if (source === '大麦网') return 'damai';
            return 'other';
        }

        function renderCard(c) {
            return `
                <a class="concert-card" href="${c.url || '#'}" target="_blank" rel="noopener noreferrer">
                    <div class="card-inner">
                        ${c.img
                            ? `<img class="card-img" src="${c.img}" alt="${c.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-img-placeholder" style="display:none">🎵</div>`
                            : `<div class="card-img-placeholder">🎵</div>`}
                        <div class="card-body">
                            <div class="card-name">${c.name}</div>
                            ${c.artist ? `<div class="card-artist">🎤 ${c.artist}</div>` : ''}
                            <div class="card-meta">
                                <span>📅 ${c.time || '待定'}</span>
                                <span>📍 ${c.city} · ${c.venue || '待定'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <span class="card-price">${c.price || '暂无'}</span>
                        <span style="display:flex;align-items:center;gap:6px;">
                            <span class="card-status ${getStatusClass(c.status)}">${c.status || '未知'}</span>
                            <span class="source-badge ${getSourceClass(c.source)}">${c.source}</span>
                            <span class="card-footer-link">购票 →</span>
                        </span>
                    </div>
                </a>`;
        }

        function switchProvince(province) {
            currentProvince = province;

            // 更新标签样式
            document.querySelectorAll('.province-tag').forEach(tag => {
                tag.classList.toggle('active', tag.dataset.province === province);
            });

            // 筛选数据
            if (province) {
                currentConcerts = allConcerts.filter(c => c.province === province);
                document.getElementById('locationBadge').querySelector('#locationText').textContent = province;
            } else {
                currentConcerts = allConcerts;
                document.getElementById('locationBadge').querySelector('#locationText').textContent = '全国';
            }

            // 更新统计
            const cities = {};
            currentConcerts.forEach(c => {
                const city = c.city || '未知';
                cities[city] = (cities[city] || 0) + 1;
            });
            document.getElementById('totalCount').textContent = currentConcerts.length;
            document.getElementById('cityCount').textContent = Object.keys(cities).length;

            // 更新城市下拉
            const filterCity = document.getElementById('filterCity');
            filterCity.innerHTML = '<option value="">全部城市</option>' +
                Object.keys(cities).sort().map(city => `<option value="${city}">${city}</option>`).join('');
            filterCity.value = '';

            // 显示筛选栏
            document.getElementById('filterBar').style.display = '';

            applyFilter();
        }

        function applyFilter() {
            const city = document.getElementById('filterCity').value;
            const status = document.getElementById('filterStatus').value;
            const keyword = document.getElementById('filterKeyword').value.toLowerCase();

            const filtered = currentConcerts.filter(c => {
                if (city && c.city !== city) return false;
                if (status && c.status !== status) return false;
                if (keyword && !(c.name || '').toLowerCase().includes(keyword) &&
                    !(c.artist || '').toLowerCase().includes(keyword)) return false;
                return true;
            });

            const list = document.getElementById('concertList');
            const info = document.getElementById('resultsInfo');

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">🔍</div>
                        <p>当前省份暂无匹配的演唱会</p>
                    </div>`;
                info.innerHTML = `共 <strong>0</strong> 场匹配结果`;
                return;
            }

            info.innerHTML = `<span>共 <strong>${filtered.length}</strong> 场演唱会</span>
                <span style="font-size:12px;">当前：${currentProvince || '全国'}</span>`;
            list.innerHTML = filtered.map(renderCard).join('');
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type}`;
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 自动刷新（每30分钟重新 fetch data.json）
        const REFRESH_INTERVAL = 30 * 60;
        let countdownSeconds = REFRESH_INTERVAL;
        let refreshTimer = null;

        function updateCountdown() {
            const m = String(Math.floor(countdownSeconds / 60)).padStart(2, '0');
            const s = String(countdownSeconds % 60).padStart(2, '0');
            document.getElementById('countdown').textContent = `${m}:${s}`;
        }

        function startAutoRefresh() {
            countdownSeconds = REFRESH_INTERVAL;
            updateCountdown();
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(async () => {
                countdownSeconds--;
                updateCountdown();
                if (countdownSeconds <= 0) {
                    clearInterval(refreshTimer);
                    await checkForUpdates();
                    startAutoRefresh();
                }
            }, 1000);
        }

        async function checkForUpdates() {
            try {
                const resp = await fetch(DATA_URL + '?t=' + Date.now());
                const result = await resp.json();
                if (result.total !== allConcerts.length) {
                    showToast(`🎶 数据已更新：${result.total} 场，页面即将刷新`, 'success');
                    setTimeout(() => location.reload(), 2000);
                } else {
                    showToast('✅ 已自动检查，暂无新数据', 'success');
                }
            } catch (e) {}
        }

        // 定位徽章点击 → 切换回全国
        document.getElementById('locationBadge').addEventListener('click', () => {
            switchProvince('');
        });

        // 页面加载
        async function init() {
            try {
                const resp = await fetch(DATA_URL + '?t=' + Date.now());
                const data = await resp.json();
                allConcerts = data.concerts || [];
                provinces = data.provinces || {};

                document.getElementById('updateTime').textContent = data.update_time || '暂无';
                document.getElementById('nationalCount').textContent = allConcerts.length;

                // 渲染省份标签
                const provinceBar = document.getElementById('provinceBar');
                const provinceTags = document.getElementById('provinceTags');
                const sortedProvinces = Object.entries(provinces).sort((a, b) => b[1] - a[1]);
                provinceTags.innerHTML = `<span class="province-tag" data-province="" onclick="switchProvince('')">全国</span>` +
                    sortedProvinces.map(([p, count]) =>
                        `<span class="province-tag" data-province="${p}" onclick="switchProvince('${p}')">${p}<span class="tag-count">${count}</span></span>`
                    ).join('');
                provinceBar.style.display = '';

                // IP 定位
                const detected = await detectLocation();
                const matched = matchProvince(detected);
                if (matched && provinces[matched]) {
                    document.getElementById('locationText').textContent = matched;
                    switchProvince(matched);
                    showToast(`📍 已定位到${matched}，共 ${provinces[matched]} 场演唱会`, 'success');
                } else {
                    document.getElementById('locationText').textContent = '全国';
                    switchProvince('');
                    if (detected) {
                        document.getElementById('locationText').textContent = `${detected}(暂无数据)`;
                    }
                }

                startAutoRefresh();
            } catch (e) {
                document.getElementById('concertList').innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">⚠️</div>
                        <p>数据加载失败，请稍后刷新重试</p>
                    </div>`;
                document.getElementById('updateTime').textContent = '加载失败';
            }
        }

        init();
    </script>
</body>
</html>
