<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演唱会·集</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --border: #2a2a4a;
            --primary: #e94560;
            --primary-glow: rgba(233, 69, 96, 0.3);
            --accent: #0f3460;
            --accent2: #533483;
            --text: #eee;
            --text2: #aab;
            --green: #00d68f;
            --yellow: #ffaa00;
            --red: #ff3d71;
            --blue: #0095ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .top-bar {
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent2), var(--blue), var(--primary));
            background-size: 200% 100%;
            animation: gradient 4s ease infinite;
        }
        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header {
            padding: 32px 40px 24px;
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            pointer-events: none;
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .header h1 span { color: var(--primary); }
        .header .subtitle {
            color: var(--text2);
            font-size: 14px;
            margin-top: 4px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .location-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            color: var(--primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .location-badge:hover {
            background: rgba(233, 69, 96, 0.2);
        }
        .location-badge .loc-icon { font-size: 15px; }

        .stats-summary {
            max-width: 1400px;
            margin: 24px auto 0;
            padding: 0 40px;
        }
        .stats-summary-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            flex-wrap: wrap;
        }
        .stats-summary-left {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .stats-total {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1.2;
        }
        .stats-total-label {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.2;
        }
        .stats-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
            align-items: center;
        }
        .stats-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            user-select: none;
        }
        .stats-chip:hover { border-color: var(--primary); color: var(--primary); }
        .stats-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .stats-chip .chip-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .chip-dot.selling { background: #52c41a; }
        .chip-dot.presale { background: #1890ff; }
        .chip-dot.soldout { background: #ff4d4f; }
        .chip-dot.ended { background: #999; }
        .chip-dot.pending { background: #faad14; }
        .stats-summary-right {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: auto;
            flex-shrink: 0;
        }
        /* 省份切换栏 */
        .province-bar {
            max-width: 1400px;
            margin: 16px auto 0;
            padding: 0 40px;
        }
        .province-bar-inner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
        }
        .province-bar-label {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .province-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .province-tag {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .province-tag:hover {
            border-color: var(--primary);
            color: var(--text);
        }
        .province-tag.active {
            background: rgba(233, 69, 96, 0.15);
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }
        .province-tag .tag-count {
            font-size: 11px;
            margin-left: 4px;
            opacity: 0.7;
        }

        .filter-bar {
            max-width: 1400px;
            margin: 16px auto 0;
            padding: 0 40px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar label {
            color: var(--text2);
            font-size: 14px;
            margin-right: -4px;
        }
        .filter-bar select,
        .filter-bar input {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .filter-bar select:focus,
        .filter-bar input:focus { border-color: var(--primary); }
        .filter-bar input { width: 200px; }
        .filter-bar select option { background: var(--surface); }

        .results-info {
            max-width: 1400px;
            margin: 20px auto 0;
            padding: 0 40px;
            color: var(--text2);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .results-info strong { color: var(--text); }

        .concert-list {
            max-width: 1400px;
            margin: 16px auto 40px;
            padding: 0 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        .concert-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.25s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .concert-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .concert-card:hover .card-name {
            color: var(--primary);
        }
        .concert-card {
            cursor: pointer;
        }
        .card-footer-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            background: rgba(233, 69, 96, 0.12);
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }
        .card-footer-link:hover {
            background: rgba(233, 69, 96, 0.25);
        }
        .card-inner {
            display: flex;
            gap: 16px;
            padding: 18px;
        }
        .card-img {
            width: 90px;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--surface2);
        }
        .card-img-placeholder {
            width: 90px;
            height: 120px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .card-body { flex: 1; min-width: 0; }
        .card-name {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .card-artist {
            font-size: 13px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .card-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            color: var(--text2);
        }
        .card-meta span { display: flex; align-items: center; gap: 4px; }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.15);
        }
        .card-price {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: baseline;
            gap: 0;
        }
        .card-price .price-currency {
            color: var(--text2);
            font-size: 12px;
            font-weight: 400;
        }
        .card-price .price-amount {
            color: var(--yellow);
            font-weight: 700;
        }
        .card-price .price-suffix {
            color: var(--text2);
            font-size: 12px;
            font-weight: 400;
            margin-left: 2px;
        }
        .card-status {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        .status-selling { background: rgba(0, 214, 143, 0.15); color: var(--green); }
        .status-presale { background: rgba(0, 149, 255, 0.15); color: var(--blue); }
        .status-soldout { background: rgba(255, 61, 113, 0.15); color: var(--red); }
        .status-ended { background: rgba(170, 170, 187, 0.15); color: var(--text2); }
        .status-unknown { background: rgba(170, 170, 187, 0.15); color: var(--text2); }
        .status-pending { background: rgba(255, 165, 0, 0.15); color: #ff8c00; }
        .status-replenish { background: rgba(76, 175, 80, 0.15); color: #4caf50; }

        .source-badge {
            display: inline-block;
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 3px;
            margin-left: 6px;
            font-weight: 500;
            vertical-align: middle;
        }
        .source-badge.piaoniu { background: rgba(233, 30, 99, 0.15); color: #e91e63; }
        .source-badge.ypiao { background: rgba(255, 152, 0, 0.15); color: #ff9800; }
        .source-badge.damai { background: rgba(255, 61, 113, 0.15); color: #ff3d71; }
        .source-badge.other { background: rgba(170, 170, 187, 0.15); color: var(--text2); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 16px; }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            max-width: 360px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: var(--green); color: #000; }
        .toast.error { background: var(--red); color: #fff; }

        .auto-refresh-bar {
            max-width: 1400px;
            margin: 0 auto 40px;
            padding: 0 40px;
            display: flex;
            justify-content: center;
            gap: 8px;
            color: var(--text2);
            font-size: 13px;
        }
        .auto-refresh-bar .countdown {
            color: var(--primary);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 768px) {
            .header { padding: 20px; }
            .stats-summary, .filter-bar, .results-info, .concert-list, .province-bar, .auto-refresh-bar {
                padding: 0 16px;
            }
            .concert-list { grid-template-columns: 1fr; }
            .card-img, .card-img-placeholder { width: 70px; height: 95px; }
            .header-content { flex-direction: column; align-items: flex-start; }
            .province-tags { gap: 6px; }
            .province-tag { padding: 5px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>

    <header class="header">
        <div class="header-content">
            <div>
                <h1>🎵 <span>演唱会·集</span></h1>
                <p class="subtitle">全国演唱会信息聚合</p>
            </div>
            <div class="header-right">
                <span class="location-badge" id="locationBadge" title="点击查看全部省份">
                    <span class="loc-icon">📍</span>
                    <span id="locationText">定位中...</span>
                </span>
            </div>
        </div>
    </header>

    <section class="stats-summary" id="statsSummary">
        <div class="stats-summary-inner">
            <div class="stats-summary-left">
                <span class="stats-total" id="totalCount">-</span>
                <span class="stats-total-label">场演唱会</span>
            </div>
            <div class="stats-chips" id="statusChips"></div>
            <div class="stats-summary-right">
                <span class="stats-update" id="updateTime"></span>
            </div>
        </div>
    </section>

    <section class="province-bar" id="provinceBar" style="display:none;">
        <div class="province-bar-inner">
            <div class="province-bar-label">🌏 选择省份</div>
            <div class="province-tags" id="provinceTags"></div>
        </div>
    </section>

    <section class="filter-bar" id="filterBar" style="display:none;">
        <label>筛选：</label>
        <select id="filterCity" onchange="applyFilter()">
            <option value="">全部城市</option>
        </select>
        <select id="filterStatus" onchange="applyFilter()">
            <option value="">全部状态</option>
            <option value="在售">在售</option>
            <option value="预售">预售</option>
            <option value="已售罄">已售罄</option>
            <option value="已结束">已结束</option>
            <option value="待定">待定</option>
        </select>
        <input type="text" id="filterKeyword" placeholder="搜索歌手/演唱会名..." oninput="applyFilter()">
    </section>

    <div class="results-info" id="resultsInfo"></div>

    <main class="concert-list" id="concertList">
        <div class="empty-state" style="grid-column: 1/-1;">
            <div class="icon">⏳</div>
            <p>正在加载演唱会数据...</p>
        </div>
    </main>

    <div class="auto-refresh-bar" id="autoRefreshBar">
        <span>数据每30分钟自动更新，下次刷新：</span>
        <span class="countdown" id="countdown">--:--</span>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let allConcerts = [];
        let currentConcerts = [];
        let provinces = {};
        let currentProvince = '';
        const DATA_URL = 'data.json';

        // Cloudflare loc 代码 → 中文省份
        const LOC_CODE_TO_PROVINCE = {
            "BJ": "北京", "SH": "上海", "TJ": "天津", "CQ": "重庆",
            "HE": "河北", "SX": "山西", "NM": "内蒙古", "LN": "辽宁", "JL": "吉林",
            "HL": "黑龙江", "JS": "江苏", "ZJ": "浙江", "AH": "安徽", "FJ": "福建",
            "JX": "江西", "SD": "山东", "HA": "河南", "HB": "湖北", "HN": "湖南",
            "GD": "广东", "GX": "广西", "HI": "海南", "SC": "四川", "GZ": "贵州",
            "YN": "云南", "SN": "陕西", "GS": "甘肃", "QH": "青海",
            "NX": "宁夏", "XJ": "新疆", "XZ": "西藏", "TW": "台湾",
            "MO": "澳门", "HK": "香港",
        };
        // pconline JSONP IP 定位（国内稳定、速度快、无需 CORS）
        function detectLocationJsonp() {
            return new Promise((resolve) => {
                const cbName = 'IPCallBack_' + Date.now();
                const timeout = setTimeout(() => {
                    console.warn('pconline IP 定位超时');
                    delete window[cbName];
                    if (script.parentNode) document.head.removeChild(script);
                    resolve('');
                }, 5000);

                window[cbName] = function(data) {
                    clearTimeout(timeout);
                    delete window[cbName];
                    if (script.parentNode) document.head.removeChild(script);
                    if (data && data.pro) {
                        // data.pro 格式："江苏省"、"广东省"等，strip 后缀
                        resolve(data.pro.replace(/省|市|自治区|壮族|维吾尔|回族|特别行政区/g, ''));
                    } else {
                        resolve('');
                    }
                };

                const script = document.createElement('script');
                script.src = 'https://whois.pconline.com.cn/ipJson.jsp?callback=' + cbName + '&_t=' + Date.now();
                script.onerror = function() {
                    clearTimeout(timeout);
                    delete window[cbName];
                    if (script.parentNode) document.head.removeChild(script);
                    console.warn('pconline script 加载失败');
                    resolve('');
                };
                document.head.appendChild(script);
            });
        }

        async function detectLocation() {
            // 方案1: pconline JSONP（国内稳定、速度快、无需 CORS）
            try {
                const province = await detectLocationJsonp();
                if (province) return province;
            } catch (e) {
                console.warn('pconline 定位失败:', e);
            }

            // 方案2: CF /cdn-cgi/trace
            try {
                const resp = await fetch('/cdn-cgi/trace', { signal: AbortSignal.timeout(3000) });
                const text = await resp.text();
                const match = text.match(/loc=(\w+)/);
                if (match) return match[1];
            } catch (e) {
                console.warn('CF trace 定位失败:', e);
            }

            return '';
        }

        // 匹配省份名（兼容 CF loc 代码和 API 返回的中文名）
        function matchProvince(detected) {
            if (!detected) return '';
            // CF loc 代码 → 省份名
            if (LOC_CODE_TO_PROVINCE[detected]) {
                detected = LOC_CODE_TO_PROVINCE[detected];
            }
            // 直接匹配
            if (provinces[detected]) return detected;
            // 模糊匹配
            for (const p of Object.keys(provinces)) {
                if (p === detected || p.includes(detected) || detected.includes(p)) return p;
            }
            return '';
        }

        function formatPrice(price) {
            // 支持 ¥1400起、1400起、¥3199起 等格式
            const match = price.match(/^(¥?)(\d+)(.*)/);
            if (!match) return price;
            const [, currency, amount, suffix] = match;
            return `<span class="price-currency">${currency || '¥'}</span><span class="price-amount">${amount}</span><span class="price-suffix">${suffix || '起'}</span>`;
        }

        function getStatusClass(status) {
            if (status === '预售') return 'status-presale';
            if (status === '在售') return 'status-selling';
            if (status === '已售罄') return 'status-soldout';
            if (status === '已结束') return 'status-ended';
            if (status === '待定') return 'status-pending';
            if (status === '补票中') return 'status-replenish';
            return 'status-unknown';
        }

        function getSourceClass(source) {
            if (source === '票牛网') return 'piaoniu';
            if (source === '有票网') return 'ypiao';
            if (source === '大麦网') return 'damai';
            return 'other';
        }

        function renderCard(c) {
            const hasMulti = c.url2;
            // 多源时也用 <a> 标签，直接点击跳到最优平台
            const href = `href="${c.url || '#'}" target="_blank" rel="noopener noreferrer"`;
            const source2Label = c.source2 || '其他';
            const buyLinks = hasMulti
                ? `<span class="card-footer-link" onclick="event.stopPropagation();window.open('${c.url2}','_blank')">${source2Label}</span>`
                : '';
            // 多源时不显示 source badge，单源时显示
            const sourceBadge = hasMulti
                ? ''
                : `<span class="source-badge ${getSourceClass(c.source)}">${c.source}</span>`;

            return `
                <a class="concert-card" ${href}>
                    <div class="card-inner">
                        ${c.img
                            ? `<img class="card-img" src="${c.img}" alt="${c.name}" referrerpolicy="no-referrer" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-img-placeholder" style="display:none">🎵</div>`
                            : `<div class="card-img-placeholder">🎵</div>`}
                        <div class="card-body">
                            <div class="card-name">${c.name}</div>
                            ${c.artist ? `<div class="card-artist">🎤 ${c.artist}</div>` : ''}
                            <div class="card-meta">
                                <span>📅 ${c.time || '待定'}</span>
                                <span>📍 ${c.city} · ${c.venue || '待定'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <span class="card-price">${c.price ? formatPrice(c.price) : '<span style="color:var(--text2)">暂无</span>'}</span>
                        <span style="display:flex;align-items:center;gap:6px;">
                            <span class="card-status ${getStatusClass(c.status)}">${c.status || '未知'}</span>
                            ${sourceBadge}
                            ${buyLinks}
                        </span>
                    </div>
                </a>`;
        }

        function switchProvince(province) {
            currentProvince = province;

            // 更新标签样式
            document.querySelectorAll('.province-tag').forEach(tag => {
                tag.classList.toggle('active', tag.dataset.province === province);
            });

            // 筛选数据
            if (province) {
                currentConcerts = allConcerts.filter(c => c.province === province);
                document.getElementById('locationBadge').querySelector('#locationText').textContent = province;
            } else {
                currentConcerts = allConcerts;
                document.getElementById('locationBadge').querySelector('#locationText').textContent = '全国';
            }

            // 更新统计
            const cities = {};
            const statusMap = {};
            currentConcerts.forEach(c => {
                const city = c.city || '未知';
                cities[city] = (cities[city] || 0) + 1;
                const s = c.status || '待定';
                statusMap[s] = (statusMap[s] || 0) + 1;
            });
            document.getElementById('totalCount').textContent = currentConcerts.length;

            // 状态标签
            const statusOrder = ['在售', '预售', '已售罄', '已结束', '待定'];
            const dotClass = { '在售': 'selling', '预售': 'presale', '已售罄': 'soldout', '已结束': 'ended', '待定': 'pending' };
            const chipsEl = document.getElementById('statusChips');
            chipsEl.innerHTML = statusOrder
                .filter(s => statusMap[s])
                .map(s => `<span class="stats-chip" data-status="${s}" onclick="toggleStatusChip(this)"><span class="chip-dot ${dotClass[s]}"></span>${s} ${statusMap[s]}</span>`)
                .join('');

            // 更新时间（从全局数据获取）
            if (allConcerts.length > 0) {
                document.getElementById('updateTime').textContent = allConcerts._updateTime || '';
            }

            // 更新城市下拉
            const filterCity = document.getElementById('filterCity');
            filterCity.innerHTML = '<option value="">全部城市</option>' +
                Object.keys(cities).sort().map(city => `<option value="${city}">${city}</option>`).join('');
            filterCity.value = '';

            // 显示筛选栏
            document.getElementById('filterBar').style.display = '';

            applyFilter();
        }

        // 状态标签点击筛选
        function toggleStatusChip(el) {
            const status = el.dataset.status;
            const filterStatus = document.getElementById('filterStatus');
            // 同步到下拉框
            if (el.classList.contains('active')) {
                el.classList.remove('active');
                filterStatus.value = '';
            } else {
                document.querySelectorAll('.stats-chip').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
                filterStatus.value = status;
            }
            applyFilter();
        }

        function applyFilter() {
            const city = document.getElementById('filterCity').value;
            const status = document.getElementById('filterStatus').value;
            const keyword = document.getElementById('filterKeyword').value.toLowerCase();

            const filtered = currentConcerts.filter(c => {
                if (city && c.city !== city) return false;
                if (status && c.status !== status) return false;
                if (keyword && !(c.name || '').toLowerCase().includes(keyword) &&
                    !(c.artist || '').toLowerCase().includes(keyword)) return false;
                return true;
            });

            const list = document.getElementById('concertList');
            const info = document.getElementById('resultsInfo');

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">🔍</div>
                        <p>当前省份暂无匹配的演唱会</p>
                    </div>`;
                info.innerHTML = `共 <strong>0</strong> 场匹配结果`;
                return;
            }

            info.innerHTML = `<span>共 <strong>${filtered.length}</strong> 场演唱会</span>
                <span style="font-size:12px;">当前：${currentProvince || '全国'}</span>`;
            list.innerHTML = filtered.map(renderCard).join('');
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type}`;
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 自动刷新（每30分钟重新 fetch data.json）
        const REFRESH_INTERVAL = 30 * 60;
        let countdownSeconds = REFRESH_INTERVAL;
        let refreshTimer = null;

        function updateCountdown() {
            const m = String(Math.floor(countdownSeconds / 60)).padStart(2, '0');
            const s = String(countdownSeconds % 60).padStart(2, '0');
            document.getElementById('countdown').textContent = `${m}:${s}`;
        }

        function startAutoRefresh() {
            countdownSeconds = REFRESH_INTERVAL;
            updateCountdown();
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(async () => {
                countdownSeconds--;
                updateCountdown();
                if (countdownSeconds <= 0) {
                    clearInterval(refreshTimer);
                    await checkForUpdates();
                    startAutoRefresh();
                }
            }, 1000);
        }

        async function checkForUpdates() {
            try {
                const resp = await fetch(DATA_URL + '?t=' + Date.now());
                const result = await resp.json();
                if (result.total !== allConcerts.length) {
                    showToast(`🎶 数据已更新：${result.total} 场，页面即将刷新`, 'success');
                    setTimeout(() => location.reload(), 2000);
                } else {
                    showToast('✅ 已自动检查，暂无新数据', 'success');
                }
            } catch (e) {}
        }

        // 定位徽章点击 → 切换回全国
        document.getElementById('locationBadge').addEventListener('click', () => {
            switchProvince('');
        });

        // 页面加载
        async function init() {
            try {
                const resp = await fetch(DATA_URL + '?t=' + Date.now());
                const data = await resp.json();
                allConcerts = data.concerts || [];
                allConcerts._updateTime = data.update_time ? '更新于 ' + data.update_time.slice(5, 16) : '';
                provinces = data.provinces || {};

                document.getElementById('updateTime').textContent = allConcerts._updateTime;

                // 渲染省份标签
                const provinceBar = document.getElementById('provinceBar');
                const provinceTags = document.getElementById('provinceTags');
                const sortedProvinces = Object.entries(provinces).sort((a, b) => b[1] - a[1]);
                provinceTags.innerHTML = `<span class="province-tag" data-province="" onclick="switchProvince('')">全国</span>` +
                    sortedProvinces.map(([p, count]) =>
                        `<span class="province-tag" data-province="${p}" onclick="switchProvince('${p}')">${p}<span class="tag-count">${count}</span></span>`
                    ).join('');
                provinceBar.style.display = '';

                // IP 定位
                const detected = await detectLocation();
                const matched = matchProvince(detected);
                if (matched && provinces[matched]) {
                    document.getElementById('locationText').textContent = matched;
                    switchProvince(matched);
                    showToast(`📍 已定位到${matched}，共 ${provinces[matched]} 场演唱会`, 'success');
                } else {
                    document.getElementById('locationText').textContent = '全国';
                    switchProvince('');
                    if (detected) {
                        document.getElementById('locationText').textContent = `${detected}(暂无数据)`;
                    }
                }

                startAutoRefresh();
            } catch (e) {
                document.getElementById('concertList').innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">⚠️</div>
                        <p>数据加载失败，请稍后刷新重试</p>
                    </div>`;
                document.getElementById('updateTime').textContent = '加载失败';
            }
        }

        init();
    </script>
</body>
</html>
